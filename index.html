<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#060912" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Sales Genie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:opsz,wght@9..144,500;9..144,700&display=swap" rel="stylesheet">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%236d5cff'/%3E%3Cstop offset='1' stop-color='%234f8cff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Cpath d='M22 44 Q22 38 26 36 L38 36 Q42 38 42 44 L40 46 L24 46 Z' fill='%23f5d97a'/%3E%3Cellipse cx='32' cy='36' rx='9' ry='2' fill='%23dcb654'/%3E%3Cpath d='M28 36 Q26 28 30 24 Q34 22 36 26 Q34 30 30 32 Z' fill='white' opacity='0.85'/%3E%3Ccircle cx='34' cy='20' r='3' fill='white' opacity='0.7'/%3E%3Ccircle cx='40' cy='14' r='2' fill='white' opacity='0.5'/%3E%3C/svg%3E" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%236d5cff'/%3E%3Cstop offset='1' stop-color='%234f8cff'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Cpath d='M22 44 Q22 38 26 36 L38 36 Q42 38 42 44 L40 46 L24 46 Z' fill='%23f5d97a'/%3E%3Cellipse cx='32' cy='36' rx='9' ry='2' fill='%23dcb654'/%3E%3Cpath d='M28 36 Q26 28 30 24 Q34 22 36 26 Q34 30 30 32 Z' fill='white' opacity='0.85'/%3E%3Ccircle cx='34' cy='20' r='3' fill='white' opacity='0.7'/%3E%3Ccircle cx='40' cy='14' r='2' fill='white' opacity='0.5'/%3E%3C/svg%3E" />
  <style>
    :root {
      /* Canvas */
      --bg: #07091160;
      --bg-base: #060912;
      --bg-2: #0f1424;
      --surface: #161c2e;
      --surface-2: #1f2740;
      --surface-3: #2a3554;
      --border: #2a3553;
      --border-soft: #1f2740;
      --text: #eef2fb;
      --text-2: #c7cee0;
      --muted: #8b95ad;
      --muted-2: #6c7591;

      /* Brand palette */
      --accent: #5b8cff;
      --accent-soft: #8aabff;
      --accent-2: #7c5cff;
      --accent-3: #c084fc;
      --gold: #f5c863;
      --gold-soft: #f7d98a;

      /* Status */
      --good: #22c55e;
      --good-soft: #4ade80;
      --warn: #f59e0b;
      --bad: #ef4444;

      /* Geometry */
      --radius: 16px;
      --radius-sm: 10px;
      --radius-lg: 22px;

      /* Elevation */
      --shadow-1: 0 1px 2px rgba(0,0,0,0.3), 0 1px 1px rgba(0,0,0,0.2);
      --shadow-2: 0 6px 14px -4px rgba(0,0,0,0.5), 0 2px 4px rgba(0,0,0,0.3);
      --shadow-3: 0 24px 48px -16px rgba(0,0,0,0.6), 0 8px 16px -8px rgba(0,0,0,0.4);
      --shadow-glow: 0 0 0 1px rgba(124, 92, 255, 0.18), 0 8px 24px -8px rgba(124, 92, 255, 0.45);

      /* Motion */
      --ease: cubic-bezier(0.2, 0.8, 0.2, 1);
      --ease-spring: cubic-bezier(0.4, 1.6, 0.5, 1);
      --t-fast: 120ms;
      --t-base: 220ms;
      --t-slow: 380ms;

      /* Typography */
      --font-body: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-display: 'Fraunces', 'Inter', -apple-system, system-ui, sans-serif;

      /* Brand gradients */
      --grad-magic: linear-gradient(110deg, #5b8cff 0%, #7c5cff 50%, #c084fc 100%);
      --grad-magic-soft: linear-gradient(135deg, rgba(124,92,255,0.18) 0%, rgba(91,140,255,0.18) 100%);
      --grad-gold: linear-gradient(135deg, #f7d98a 0%, #e0a634 100%);

      /* Safe areas */
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-top: env(safe-area-inset-top, 0px);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { font-size: 16px; }
    html, body {
      margin: 0; padding: 0;
      min-height: 100vh;
      min-height: 100svh;
      background: var(--bg-base);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 1rem;
      line-height: 1.5;
      letter-spacing: -0.005em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior-y: contain;
    }
    /* Subtle ambient gradient on the canvas — gives the app depth without being noisy */
    body {
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(124,92,255,0.12), transparent 60%),
        radial-gradient(900px 500px at -10% 20%, rgba(91,140,255,0.10), transparent 60%),
        radial-gradient(800px 400px at 50% 110%, rgba(192,132,252,0.08), transparent 60%),
        var(--bg-base);
      background-attachment: fixed;
    }
    button, input, textarea, select {
      font: inherit; color: inherit;
    }
    button { font-family: var(--font-body); }
    a { color: var(--accent-soft); text-decoration: none; }
    a:hover { text-decoration: underline; }
    img { max-width: 100%; display: block; }
    h1, h2, h3 { letter-spacing: -0.022em; }
    ::selection { background: rgba(124,92,255,0.4); color: white; }

    /* App shell */
    #root { min-height: 100%; padding-top: var(--safe-top); padding-bottom: calc(88px + var(--safe-bottom)); }
    .topbar {
      position: sticky; top: 0; z-index: 5;
      background: rgba(7, 10, 18, 0.7);
      backdrop-filter: saturate(160%) blur(20px);
      -webkit-backdrop-filter: saturate(160%) blur(20px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding: calc(12px + var(--safe-top)) 16px 12px;
      display: flex; align-items: center; gap: 12px;
    }
    .topbar h1 {
      font-size: 17px; margin: 0; flex: 1;
      font-weight: 700; letter-spacing: -0.01em;
      display: flex; align-items: center; gap: 9px;
    }
    .topbar h1 .logo { width: 28px; height: 28px; flex: 0 0 auto; filter: drop-shadow(0 2px 6px rgba(124,92,255,0.4)); }
    .brand-mark { width: 96px; height: 96px; filter: drop-shadow(0 16px 28px rgba(124,92,255,0.45)); }
    .brand-name {
      font-family: var(--font-display);
      font-size: 36px; font-weight: 700; letter-spacing: -0.03em;
      background: linear-gradient(120deg, #fff 0%, #d6dcff 40%, #d0baff 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .topbar .icon-btn {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      width: 36px; height: 36px;
      border-radius: 50%;
      padding: 0;
      color: var(--text);
      display: inline-flex; align-items: center; justify-content: center;
      transition: background var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
    }
    .topbar .icon-btn:active { transform: scale(0.92); background: rgba(255,255,255,0.08); }
    .container { padding: 18px 16px; max-width: 720px; margin: 0 auto; }

    /* Bottom tab bar */
    .tabbar {
      position: fixed; left: 0; right: 0; bottom: 0;
      background: rgba(7, 10, 18, 0.78);
      backdrop-filter: saturate(160%) blur(22px);
      -webkit-backdrop-filter: saturate(160%) blur(22px);
      border-top: 1px solid rgba(255,255,255,0.06);
      display: grid; grid-template-columns: 1fr 1fr 1fr 1fr;
      padding: 8px 0 var(--safe-bottom);
      z-index: 10;
    }
    .tabbar button {
      background: none; border: none;
      padding: 8px 4px 6px;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      color: var(--muted-2);
      font-size: 11px; font-weight: 600; letter-spacing: -0.01em;
      transition: color var(--t-fast) var(--ease), transform var(--t-fast) var(--ease);
      position: relative;
    }
    .tabbar button:active { transform: scale(0.94); }
    .tabbar button.active { color: var(--accent-soft); }
    .tabbar button.active::before {
      content: ''; position: absolute; top: 0; left: 50%;
      transform: translateX(-50%);
      width: 22px; height: 3px; border-radius: 0 0 4px 4px;
      background: var(--grad-magic);
    }
    .tabbar .ic { font-size: 22px; line-height: 1; transition: transform var(--t-base) var(--ease-spring); }
    .tabbar button.active .ic { transform: translateY(-1px) scale(1.05); }

    /* Buttons */
    .btn {
      position: relative;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 13px 18px;
      border-radius: var(--radius);
      font-weight: 600; font-size: 15px;
      letter-spacing: -0.01em;
      cursor: pointer; user-select: none;
      transition: transform var(--t-fast) var(--ease), background var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease), box-shadow var(--t-fast) var(--ease);
      width: 100%;
      box-shadow: var(--shadow-1);
    }
    .btn:hover { border-color: var(--surface-3); }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn:disabled:active { transform: none; }
    .btn.primary {
      background: linear-gradient(180deg, #6398ff 0%, #4f7cf2 100%);
      border-color: rgba(255,255,255,0.12);
      color: white;
      box-shadow: 0 1px 0 rgba(255,255,255,0.18) inset, 0 8px 18px -8px rgba(91,140,255,0.6), var(--shadow-1);
    }
    .btn.primary:hover { filter: brightness(1.05); }
    .btn.primary:disabled { background: var(--surface-2); border-color: var(--border); color: var(--muted); box-shadow: var(--shadow-1); }
    .btn.ghost { background: transparent; box-shadow: none; }
    .btn.ghost:hover { background: rgba(255,255,255,0.03); }
    .btn.danger { background: transparent; border-color: rgba(239,68,68,0.5); color: var(--bad); box-shadow: none; }
    .btn.danger:hover { background: rgba(239,68,68,0.06); }
    .btn.small { padding: 9px 14px; font-size: 13px; width: auto; border-radius: 12px; }
    .btn.row { width: auto; }

    /* Inputs */
    .input, .textarea, .select {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 13px 14px;
      color: var(--text);
      outline: none;
      transition: border-color var(--t-fast) var(--ease), box-shadow var(--t-fast) var(--ease), background var(--t-fast) var(--ease);
      font-size: 15px;
      letter-spacing: -0.005em;
    }
    .input::placeholder, .textarea::placeholder { color: var(--muted-2); }
    .input:hover, .textarea:hover, .select:hover { border-color: var(--surface-3); }
    .input:focus, .textarea:focus, .select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(91,140,255,0.18);
      background: var(--surface-2);
    }
    .textarea { min-height: 110px; resize: vertical; line-height: 1.55; }
    .select {
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, var(--muted) 50%), linear-gradient(135deg, var(--muted) 50%, transparent 50%);
      background-position: calc(100% - 18px) 50%, calc(100% - 13px) 50%;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      padding-right: 36px;
    }
    label.field { display: block; margin-bottom: 14px; }
    label.field > .lbl {
      display: block; font-size: 12px; color: var(--muted);
      margin-bottom: 7px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
    }

    /* Cards */
    .card {
      background: linear-gradient(180deg, var(--surface) 0%, var(--bg-2) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: var(--shadow-1);
      transition: border-color var(--t-base) var(--ease), transform var(--t-base) var(--ease);
    }
    .card h3 { margin: 0 0 8px; font-size: 16px; font-weight: 700; letter-spacing: -0.015em; }
    .card p.muted { color: var(--muted); margin: 0; font-size: 14px; line-height: 1.55; }

    /* Photo strip */
    .photo-strip {
      display: flex; gap: 10px; overflow-x: auto;
      padding: 4px 0 8px;
      -webkit-overflow-scrolling: touch;
      scroll-snap-type: x mandatory;
      mask-image: linear-gradient(to right, transparent 0, #000 16px, #000 calc(100% - 16px), transparent 100%);
      -webkit-mask-image: linear-gradient(to right, transparent 0, #000 16px, #000 calc(100% - 16px), transparent 100%);
      margin: 0 -4px;
      padding-left: 4px; padding-right: 4px;
    }
    .photo-strip::-webkit-scrollbar { display: none; }
    .photo-tile {
      position: relative;
      flex: 0 0 auto;
      width: 144px; height: 144px;
      border-radius: var(--radius);
      overflow: hidden;
      background: repeating-conic-gradient(#1a2238 0% 25%, #232c44 0% 50%) 50%/16px 16px;
      border: 1px solid var(--border);
      scroll-snap-align: start;
      box-shadow: var(--shadow-1);
    }
    .photo-tile img { width: 100%; height: 100%; object-fit: cover; }
    .photo-tile .x {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      color: white;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 999px; width: 28px; height: 28px;
      font-size: 14px; font-weight: 700;
      transition: background var(--t-fast) var(--ease);
    }
    .photo-tile .x:hover { background: rgba(239,68,68,0.85); }
    .photo-tile .badge {
      position: absolute; bottom: 8px; left: 8px;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      color: white;
      font-size: 11px; font-weight: 600;
      padding: 4px 8px; border-radius: 6px;
      letter-spacing: 0.02em;
    }
    .add-tile {
      flex: 0 0 auto;
      width: 144px; height: 144px;
      border-radius: var(--radius);
      border: 2px dashed var(--border);
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 13px; font-weight: 600;
      flex-direction: column; gap: 6px;
      background: rgba(255,255,255,0.01);
      transition: border-color var(--t-base) var(--ease), background var(--t-base) var(--ease), color var(--t-base) var(--ease), transform var(--t-fast) var(--ease);
    }
    .add-tile:hover { border-color: var(--accent); color: var(--accent-soft); background: rgba(91,140,255,0.05); }
    .add-tile:active { transform: scale(0.97); }

    /* Drafts list */
    .draft-row {
      display: flex; gap: 14px; align-items: center;
      padding: 12px;
      background: linear-gradient(180deg, var(--surface) 0%, var(--bg-2) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      cursor: pointer;
      transition: transform var(--t-fast) var(--ease), border-color var(--t-fast) var(--ease), box-shadow var(--t-fast) var(--ease);
      box-shadow: var(--shadow-1);
    }
    .draft-row:hover { border-color: var(--surface-3); transform: translateY(-1px); box-shadow: var(--shadow-2); }
    .draft-row:active { transform: scale(0.99); }
    .draft-row .thumb {
      width: 64px; height: 64px; border-radius: 12px;
      background: var(--surface-2);
      overflow: hidden; flex: 0 0 auto;
      box-shadow: var(--shadow-1);
    }
    .draft-row .thumb img { width: 100%; height: 100%; object-fit: cover; }
    .draft-row .meta { flex: 1; min-width: 0; }
    .draft-row .ttl {
      font-weight: 600; font-size: 15px; margin: 0 0 4px;
      letter-spacing: -0.012em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .draft-row .sub { color: var(--muted); font-size: 13px; display: flex; align-items: center; gap: 6px; }
    .draft-row .chev { color: var(--muted-2); font-size: 22px; line-height: 1; }

    /* Tags / badges */
    .tag { display: inline-block; padding: 3px 8px; border-radius: 999px;
      background: var(--surface-2); border: 1px solid var(--border);
      color: var(--muted); font-size: 12px; margin: 2px 4px 2px 0; }

    /* Chat */
    .chat-log { max-height: 50vh; overflow-y: auto; padding-right: 4px; }
    .msg { margin: 6px 0; padding: 10px 12px; border-radius: 12px; max-width: 85%; line-height: 1.4; }
    .msg.buyer { background: var(--surface-2); border: 1px solid var(--border); }
    .msg.you { background: var(--accent); color: white; margin-left: auto; }
    .msg .label { font-size: 11px; color: var(--muted); margin-bottom: 2px; font-weight: 600; }
    .msg.you .label { color: rgba(255,255,255,0.8); }

    /* Toast */
    .toast {
      position: fixed; left: 50%; bottom: calc(110px + var(--safe-bottom));
      transform: translateX(-50%) translateY(0);
      background: linear-gradient(180deg, var(--surface-2) 0%, var(--surface) 100%);
      border: 1px solid var(--border);
      padding: 11px 16px; border-radius: 12px;
      box-shadow: var(--shadow-3);
      z-index: 100; max-width: 90vw;
      font-size: 14px; font-weight: 500;
      letter-spacing: -0.01em;
      animation: toast-in var(--t-slow) var(--ease-spring);
    }
    @keyframes toast-in {
      from { transform: translateX(-50%) translateY(20px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }
    .toast.good { border-color: rgba(74,222,128,0.35); box-shadow: var(--shadow-3), 0 0 0 1px rgba(74,222,128,0.15); }
    .toast.bad { border-color: rgba(239,68,68,0.4); box-shadow: var(--shadow-3), 0 0 0 1px rgba(239,68,68,0.15); }

    /* Spinner (legacy, mostly replaced by .genie-think) */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Genie thinking — animated sparkle + label */
    .genie-think {
      display: inline-flex; align-items: center; gap: 8px;
      font-weight: 600;
    }
    .genie-think .spark {
      display: inline-block;
      animation: spark-pulse 1.4s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes spark-pulse {
      0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
      30% { transform: scale(1.25) rotate(15deg); opacity: 0.85; }
      60% { transform: scale(0.9) rotate(-10deg); opacity: 1; }
    }
    .genie-think .text {
      background: linear-gradient(110deg, rgba(255,255,255,0.7) 30%, white 50%, rgba(255,255,255,0.7) 70%);
      background-size: 200% 100%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: think-shimmer 2s linear infinite;
    }
    @keyframes think-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Sparkle particle utility — for AI generate moments */
    .sparkles {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 200;
    }
    .sparkles .sp {
      position: absolute;
      width: 14px; height: 14px;
      animation: sparkle-fade 1.4s ease-out forwards;
    }
    @keyframes sparkle-fade {
      0% { transform: scale(0) rotate(0deg); opacity: 0; }
      30% { transform: scale(1) rotate(120deg); opacity: 1; }
      100% { transform: scale(0.4) rotate(360deg) translateY(-30px); opacity: 0; }
    }

    /* Floating brand logo on welcome */
    .float-logo {
      animation: float-genie 4.5s ease-in-out infinite;
      will-change: transform;
    }
    @keyframes float-genie {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* Page enter animation — applied to .container on view changes */
    .page-enter {
      animation: page-fade-in var(--t-slow) var(--ease) both;
    }
    @keyframes page-fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Loading skeleton */
    .skel {
      background: linear-gradient(90deg, var(--surface) 0%, var(--surface-2) 50%, var(--surface) 100%);
      background-size: 200% 100%;
      animation: skel-shimmer 1.6s linear infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes skel-shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Marketplace grid */
    .market-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .market-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      text-align: left;
      cursor: pointer;
    }
    .market-btn .name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
    .market-btn .hint { color: var(--muted); font-size: 12px; }

    /* Misc */
    .row { display: flex; gap: 10px; align-items: center; }
    .row.between { justify-content: space-between; }
    .stack { display: flex; flex-direction: column; gap: 10px; }
    .center { text-align: center; }
    .muted { color: var(--muted); }
    .small { font-size: 13px; }
    .price { font-size: 22px; font-weight: 700; }
    hr.sep { border: none; border-top: 1px solid var(--border); margin: 14px 0; }
    .empty {
      text-align: center;
      padding: 60px 16px 40px;
      color: var(--muted);
      animation: page-fade-in var(--t-slow) var(--ease) both;
    }
    .empty .big {
      font-size: 56px; margin-bottom: 12px;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.3));
      animation: float-genie 4s ease-in-out infinite;
    }
    .empty .ttl { font-weight: 700; font-size: 18px; color: var(--text); margin-bottom: 4px; letter-spacing: -0.015em; }
    .empty .sub { font-size: 14px; max-width: 280px; margin: 0 auto; }

    /* Pickable cards (category + item type) */
    .pick-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    @media (min-width: 480px) {
      .pick-grid { grid-template-columns: 1fr 1fr 1fr; }
    }
    .pick-card {
      position: relative;
      background: linear-gradient(180deg, var(--surface) 0%, var(--bg-2) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 12px;
      text-align: center;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: transform var(--t-fast) var(--ease), border-color var(--t-base) var(--ease), box-shadow var(--t-base) var(--ease), background var(--t-base) var(--ease);
      box-shadow: var(--shadow-1);
      overflow: hidden;
    }
    .pick-card::after {
      content: ''; position: absolute; inset: 0;
      background: var(--grad-magic-soft);
      opacity: 0; transition: opacity var(--t-base) var(--ease);
      pointer-events: none;
    }
    .pick-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-2); }
    .pick-card:hover::after { opacity: 1; }
    .pick-card:active { transform: scale(0.97); }
    .pick-card .em {
      font-size: 30px; line-height: 1;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
      transition: transform var(--t-base) var(--ease-spring);
      position: relative; z-index: 1;
    }
    .pick-card:hover .em { transform: scale(1.1) rotate(-4deg); }
    .pick-card .lbl { font-size: 13px; font-weight: 600; line-height: 1.25; position: relative; z-index: 1; }

    /* Step header (shows progress through the new-listing flow) */
    .stepbar {
      display: flex; gap: 6px;
      margin-bottom: 18px;
    }
    .stepbar .pip {
      flex: 1; height: 4px;
      background: var(--surface);
      border-radius: 2px;
      transition: background var(--t-slow) var(--ease);
    }
    .stepbar .pip.done { background: var(--accent); }
    .stepbar .pip.current {
      background: var(--grad-magic);
      background-size: 200% 100%;
      animation: shimmer 2.4s linear infinite;
    }

    .step-title {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 700; margin: 0 0 6px;
      letter-spacing: -0.03em; line-height: 1.15;
    }
    .step-sub { color: var(--muted); margin: 0 0 20px; font-size: 15px; line-height: 1.5; }

    /* Welcome slides */
    .welcome-card {
      position: relative;
      background: linear-gradient(180deg, var(--surface) 0%, var(--bg-2) 100%);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 24px;
      margin-bottom: 14px;
      overflow: hidden;
      box-shadow: var(--shadow-2);
    }
    .welcome-card::before {
      content: ''; position: absolute; top: -30%; right: -20%;
      width: 240px; height: 240px;
      background: radial-gradient(circle, rgba(124,92,255,0.15) 0%, transparent 70%);
      pointer-events: none;
    }
    .welcome-card .num {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--grad-magic);
      color: white;
      display: inline-flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 15px;
      margin-bottom: 12px;
      box-shadow: 0 6px 18px -6px rgba(124,92,255,0.6);
      position: relative; z-index: 1;
    }
    .welcome-card h3 {
      margin: 0 0 8px; font-size: 18px; font-weight: 700;
      letter-spacing: -0.02em;
      position: relative; z-index: 1;
    }
    .welcome-card p {
      margin: 0; color: var(--text-2); font-size: 14.5px; line-height: 1.55;
      position: relative; z-index: 1;
    }

    /* Tip card (shown above photo upload to guide the user) */
    .tip-card {
      position: relative;
      background: linear-gradient(135deg, rgba(91,140,255,0.08) 0%, rgba(124,92,255,0.06) 100%);
      border: 1px solid rgba(91,140,255,0.25);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 16px;
      font-size: 14px;
      line-height: 1.55;
    }
    .tip-card strong { color: var(--accent-soft); font-weight: 700; }
    .tip-card ul { margin: 6px 0 0; padding-left: 20px; }
    .tip-card li { margin-bottom: 2px; }

    /* Status badges */
    .status {
      display: inline-flex;
      align-items: center; gap: 5px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .status::before {
      content: ''; width: 6px; height: 6px; border-radius: 50%;
      background: currentColor; opacity: 0.8;
    }
    .status.draft { background: rgba(138,150,172,0.15); color: var(--muted); border: 1px solid var(--border); }
    .status.posted { background: rgba(79,140,255,0.15); color: var(--accent); border: 1px solid rgba(79,140,255,0.3); }
    .status.sold { background: rgba(34,197,94,0.15); color: var(--good); border: 1px solid rgba(34,197,94,0.3); }
    .status.removed { background: rgba(239,68,68,0.1); color: var(--bad); border: 1px solid rgba(239,68,68,0.25); }

    /* Listing-health progress ring */
    .health-ring {
      width: 88px; height: 88px;
      flex: 0 0 auto;
      position: relative;
    }
    .health-ring svg { transform: rotate(-90deg); }
    .health-ring .track { stroke: var(--surface-2); }
    .health-ring .bar { stroke: var(--good); transition: stroke-dashoffset 0.6s ease; }
    .health-ring.warn .bar { stroke: var(--warn); }
    .health-ring.bad .bar { stroke: var(--bad); }
    .health-ring .num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 22px;
    }

    /* Stats hero on home */
    .stats-hero {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin-bottom: 18px;
    }
    .stat-tile {
      position: relative;
      background: linear-gradient(180deg, var(--surface) 0%, var(--bg-2) 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 10px;
      text-align: center;
      overflow: hidden;
      box-shadow: var(--shadow-1);
    }
    .stat-tile::before {
      content: ''; position: absolute; top: -40%; left: -20%;
      width: 140%; height: 80%;
      background: radial-gradient(ellipse, rgba(255,255,255,0.04) 0%, transparent 70%);
      pointer-events: none;
    }
    .stat-tile .v {
      font-family: var(--font-display);
      font-size: 26px; font-weight: 700; line-height: 1.1;
      letter-spacing: -0.03em;
    }
    .stat-tile .l { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; font-weight: 700; }
    .stat-tile.profit .v {
      background: linear-gradient(120deg, #4ade80 0%, #22c55e 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-tile.streak .v {
      background: var(--grad-magic);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Sales dashboard */
    .sales-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px;
    }
    .sales-card h3 { margin: 0 0 4px; font-size: 16px; }
    .sales-card .muted { font-size: 13px; }
    .platform-chip {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 6px;
      background: var(--surface-2); border: 1px solid var(--border);
      font-size: 12px; font-weight: 600;
      margin: 2px 4px 2px 0;
    }

    /* Action chips (for post-status quick actions) */
    .chip-row {
      display: flex; flex-wrap: wrap; gap: 6px;
    }
    .chip {
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .chip:hover { border-color: var(--accent); }
    .chip.active { background: var(--accent); border-color: var(--accent); color: white; }
    .chip.success { background: rgba(34,197,94,0.15); border-color: rgba(34,197,94,0.4); color: var(--good); }

    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(3, 5, 12, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 50;
      display: flex; align-items: flex-end; justify-content: center;
      animation: fadeIn var(--t-base) var(--ease);
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .modal {
      width: 100%; max-width: 600px;
      background: linear-gradient(180deg, var(--surface) 0%, var(--bg-2) 100%);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 22px 22px 0 0;
      padding: 24px 20px calc(24px + var(--safe-bottom));
      max-height: 90vh; overflow-y: auto;
      animation: slideUp var(--t-slow) var(--ease-spring);
      box-shadow: var(--shadow-3);
    }
    @keyframes slideUp { from { transform: translateY(60px); } to { transform: translateY(0); } }
    .modal h3 { margin: 0 0 8px; font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
    /* Modal grabber handle */
    .modal::before {
      content: ''; display: block;
      width: 40px; height: 4px; border-radius: 2px;
      background: var(--surface-3);
      margin: -8px auto 16px;
    }

    /* Confetti */
    .confetti {
      position: fixed; left: 0; right: 0; top: 0; height: 100vh;
      pointer-events: none; z-index: 200; overflow: hidden;
    }
    .confetti span {
      position: absolute;
      top: -20px;
      width: 9px; height: 14px;
      animation: confetti-fall 1.6s ease-out forwards;
      opacity: 0.95;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0); opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
    }

    /* "Magic" pulse used on AI-action buttons */
    .magic, .btn.primary.magic {
      background: linear-gradient(110deg, #5b8cff 0%, #7c5cff 35%, #c084fc 65%, #7c5cff 100%);
      background-size: 250% 100%;
      animation: shimmer 4.5s linear infinite;
      color: white;
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 1px 0 rgba(255,255,255,0.22) inset, 0 10px 30px -10px rgba(124,92,255,0.7), var(--shadow-1);
    }
    .magic:hover, .btn.primary.magic:hover { filter: brightness(1.05); }
    @keyframes shimmer {
      0% { background-position: 0% 50%; }
      100% { background-position: 250% 50%; }
    }

    /* Hide native file inputs */
    input[type=file] { display: none; }
  </style>
</head>
<body>
  <main id="root">
    <div style="min-height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; color: #8b95ad;">
      <div style="font-size: 60px; animation: float-genie 3s ease-in-out infinite; filter: drop-shadow(0 16px 28px rgba(124,92,255,0.5));">🪔</div>
      <div style="font-family: 'Fraunces', serif; font-weight: 700; font-size: 28px; color: #eef2fb; margin: 16px 0 4px; letter-spacing: -0.02em;">Sales Genie</div>
      <div style="font-size: 13px; opacity: 0.7;">summoning…</div>
    </div>
  </main>

  <!-- Error catcher so a black screen tells you what's wrong -->
  <script>
    function showFatal(msg, detail) {
      const root = document.getElementById('root');
      if (!root) return;
      root.innerHTML = `
        <div style="padding: 30px 20px; max-width: 560px; margin: 0 auto; color: #e6edf6;">
          <div style="font-size: 36px; margin-bottom: 10px;">😬</div>
          <h2 style="margin: 0 0 8px;">Something didn't load.</h2>
          <p style="color: #8a96ac; line-height: 1.5;">${msg}</p>
          ${detail ? `<pre style="background:#1a2233; border:1px solid #2c3651; border-radius:10px; padding:12px; font-size:12px; overflow:auto; white-space:pre-wrap; word-break: break-word; color:#c5d4ff;">${detail}</pre>` : ''}
          <p style="color: #8a96ac; font-size: 13px; margin-top: 14px; line-height: 1.5;">
            Most common cause: opening this file directly from your computer (a <code>file://</code> URL) instead of through a web server.
            Modern browsers block module imports under <code>file://</code>.<br><br>
            Fixes: deploy to Vercel/Netlify (free) and open the resulting HTTPS URL on your phone, OR run <code>npm start</code> in the folder and open the printed URL.
          </p>
        </div>
      `;
    }
    window.addEventListener('error', (e) => {
      const msg = (e.message || 'Unknown error') + (e.filename ? ` — ${e.filename}:${e.lineno || '?'}` : '');
      showFatal('A script error stopped the app from starting.', msg);
    });
    window.addEventListener('unhandledrejection', (e) => {
      const reason = e.reason instanceof Error ? `${e.reason.name}: ${e.reason.message}` : String(e.reason);
      showFatal('An async error stopped the app from starting.', reason);
    });
  </script>

  <script type="module">
    // localForage is lightweight and reliable on jsdelivr.
    // The background-removal library is heavy (~80MB model + ONNX runtime) so we
    // load it ONLY when the user actually taps "Clean up backgrounds." That way a
    // bad CDN response or a slow network doesn't prevent the rest of the app from
    // booting.
    import localforage from 'https://cdn.jsdelivr.net/npm/localforage@1.10.0/+esm';

    let _removeBackground = null;
    async function ensureBgRemoval() {
      if (_removeBackground) return _removeBackground;
      try {
        const mod = await import('https://esm.sh/@imgly/background-removal@1.4.5');
        _removeBackground = mod.removeBackground || mod.default?.removeBackground;
        if (!_removeBackground) throw new Error('removeBackground export not found');
        return _removeBackground;
      } catch (err) {
        throw new Error('Couldn\'t load the background-removal library. ' + (err.message || err));
      }
    }

    // ============================================================
    // Brand
    // ============================================================
    function logoSvg(size = 'logo') {
      // 'logo' (small, top bar) or 'brand-mark' (big, welcome).
      // Genie emerging from a magic lamp, purple-blue gradient backdrop.
      return `
        <svg class="${size}" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="Sales Genie">
          <defs>
            <linearGradient id="bg-${size}" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="#6d5cff" />
              <stop offset="1" stop-color="#4f8cff" />
            </linearGradient>
            <linearGradient id="lamp-${size}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0" stop-color="#f7e08a" />
              <stop offset="1" stop-color="#d8a83a" />
            </linearGradient>
            <radialGradient id="smoke-${size}" cx="0.5" cy="0.5" r="0.5">
              <stop offset="0" stop-color="white" stop-opacity="0.95" />
              <stop offset="1" stop-color="white" stop-opacity="0.05" />
            </radialGradient>
          </defs>
          <rect width="64" height="64" rx="14" fill="url(#bg-${size})" />
          <!-- stars -->
          <circle cx="14" cy="14" r="1.2" fill="white" opacity="0.7" />
          <circle cx="50" cy="10" r="1.4" fill="white" opacity="0.5" />
          <circle cx="54" cy="22" r="1" fill="white" opacity="0.6" />
          <!-- smoke / genie body -->
          <path d="M28 38 Q22 30 26 22 Q31 18 36 22 Q40 28 36 32 Q33 35 32 38 Z" fill="url(#smoke-${size})" />
          <circle cx="33" cy="22" r="2" fill="white" opacity="0.7" />
          <!-- lamp body -->
          <path d="M18 46 Q18 40 24 38 L40 38 Q46 40 46 46 L44 48 L20 48 Z" fill="url(#lamp-${size})" />
          <ellipse cx="32" cy="38" rx="11" ry="2" fill="#b8862c" opacity="0.7" />
          <!-- spout -->
          <path d="M44 42 Q50 40 50 44 Q48 45 44 45 Z" fill="url(#lamp-${size})" />
          <!-- handle -->
          <path d="M20 42 Q14 42 16 46" stroke="#b8862c" stroke-width="1.6" fill="none" stroke-linecap="round" />
        </svg>
      `;
    }

    // ============================================================
    // Storage
    // ============================================================
    const draftsStore = localforage.createInstance({ name: 'crosslist', storeName: 'drafts' });
    const photosStore = localforage.createInstance({ name: 'crosslist', storeName: 'photos' });

    // localStorage for small settings (API key, prefs)
    const settings = {
      get apiKey() { return localStorage.getItem('claude_api_key') || ''; },
      set apiKey(v) { localStorage.setItem('claude_api_key', v); },
      get model() { return localStorage.getItem('claude_model') || 'claude-sonnet-4-6'; },
      set model(v) { localStorage.setItem('claude_model', v); },
      get sellerLocation() { return localStorage.getItem('seller_location') || ''; },
      set sellerLocation(v) { localStorage.setItem('seller_location', v); },
    };

    async function listDrafts() {
      const drafts = [];
      await draftsStore.iterate((v) => { drafts.push(v); });
      return drafts.sort((a, b) => b.updatedAt - a.updatedAt);
    }
    async function getDraft(id) { return await draftsStore.getItem(id); }
    async function saveDraft(draft) {
      draft.updatedAt = Date.now();
      await draftsStore.setItem(draft.id, draft);
      return draft;
    }
    async function deleteDraft(id) {
      const d = await getDraft(id);
      if (d?.photoIds) {
        for (const pid of d.photoIds) {
          photoUrlCache.revokePersisted(pid);
          await photosStore.removeItem(pid);
        }
      }
      await draftsStore.removeItem(id);
    }
    async function savePhoto(blob) {
      const id = 'p_' + Math.random().toString(36).slice(2, 10);
      await photosStore.setItem(id, blob);
      return id;
    }
    async function getPhoto(id) { return await photosStore.getItem(id); }

    // ============================================================
    // Photo URL cache — prevents URL.createObjectURL leaks across re-renders.
    // Keyed by IndexedDB photoId for persisted photos, and by a stable index
    // for in-session blobs. Call clearPhotoUrlCache() when the active set changes
    // (different draft opened, session reset, draft deleted).
    // ============================================================
    const photoUrlCache = {
      _persisted: new Map(), // photoId -> { blob, url }
      _session: new Map(),   // index -> { blob, url } (matches state.session.photoBlobs slot+kind)
      async forPhotoId(photoId) {
        const hit = this._persisted.get(photoId);
        if (hit) return hit.url;
        const blob = await getPhoto(photoId);
        if (!blob) return null;
        const url = URL.createObjectURL(blob);
        this._persisted.set(photoId, { blob, url });
        return url;
      },
      forSessionPhoto(idx, blob) {
        const key = `${idx}:${blob === null ? 'n' : blob.size}-${blob === null ? 0 : blob.lastModified || 0}`;
        const hit = this._session.get(idx);
        if (hit && hit.key === key) return hit.url;
        if (hit) { try { URL.revokeObjectURL(hit.url); } catch {} }
        const url = URL.createObjectURL(blob);
        this._session.set(idx, { url, key });
        return url;
      },
      revokePersisted(photoId) {
        const hit = this._persisted.get(photoId);
        if (hit) { try { URL.revokeObjectURL(hit.url); } catch {} }
        this._persisted.delete(photoId);
      },
      clearPersisted() {
        for (const { url } of this._persisted.values()) { try { URL.revokeObjectURL(url); } catch {} }
        this._persisted.clear();
      },
      clearSession() {
        for (const { url } of this._session.values()) { try { URL.revokeObjectURL(url); } catch {} }
        this._session.clear();
      },
      clearAll() { this.clearPersisted(); this.clearSession(); },
    };

    // ============================================================
    // Image utilities
    // ============================================================
    async function fileToBlob(file) { return file; }

    // Resize an image blob to maxDim on the longest side (keeps aspect).
    // Returns a JPEG blob to keep payloads small.
    async function resizeImage(blob, maxDim = 1280, quality = 0.85) {
      const img = await blobToImage(blob);
      const scale = Math.min(1, maxDim / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      return await new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', quality));
    }

    function blobToImage(blob) {
      return new Promise((resolve, reject) => {
        const url = URL.createObjectURL(blob);
        const img = new Image();
        img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
        img.onerror = (e) => { URL.revokeObjectURL(url); reject(e); };
        img.src = url;
      });
    }

    function blobToDataUrl(blob) {
      return new Promise((resolve, reject) => {
        const fr = new FileReader();
        fr.onload = () => resolve(fr.result);
        fr.onerror = reject;
        fr.readAsDataURL(blob);
      });
    }

    // Compose the cutout (PNG with transparency) on top of a solid color background.
    async function compositeOnColor(cutoutBlob, color = '#ffffff') {
      const img = await blobToImage(cutoutBlob);
      const canvas = document.createElement('canvas');
      canvas.width = img.width; canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = color;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(img, 0, 0);
      return await new Promise((resolve) => canvas.toBlob(resolve, 'image/jpeg', 0.92));
    }

    // ============================================================
    // Claude API (called directly from browser)
    // ============================================================
    // Returns true if the user has a key. If not, toasts + sends them to Settings
    // and returns false so callers can short-circuit.
    function requireApiKey() {
      if (settings.apiKey) return true;
      toast('Add your Claude API key in Settings first.', 'bad', 3500);
      setView('settings');
      return false;
    }

    async function callClaude({ system, messages, maxTokens = 1500 }) {
      if (!settings.apiKey) throw new Error('Claude API key not set. Open Settings to add it.');
      let res;
      try {
        res = await fetch('https://api.anthropic.com/v1/messages', {
          method: 'POST',
          headers: {
            'content-type': 'application/json',
            'x-api-key': settings.apiKey,
            'anthropic-version': '2023-06-01',
            'anthropic-dangerous-direct-browser-access': 'true',
          },
          body: JSON.stringify({
            model: settings.model,
            max_tokens: maxTokens,
            system,
            messages,
          }),
        });
      } catch (netErr) {
        // fetch only rejects on network errors / CORS / aborts.
        throw new Error("Couldn't reach Claude. Check your internet connection and try again.");
      }
      if (!res.ok) {
        const text = await res.text();
        let detail = '';
        try { detail = JSON.parse(text).error?.message || ''; } catch {}
        if (res.status === 401) throw new Error('Your Claude API key was rejected. Update it in Settings.');
        if (res.status === 429) throw new Error("Claude is rate-limited right now. Wait a bit and try again.");
        if (res.status === 529 || res.status === 503) throw new Error('Claude is temporarily overloaded. Try again in a moment.');
        if (res.status >= 500) throw new Error(`Claude had a problem (${res.status}). Try again in a moment.`);
        throw new Error(detail || `Claude API error (${res.status})`);
      }
      const json = await res.json();
      return json.content?.map((c) => c.text).join('\n') || '';
    }

    // Pull the first ```json block, or fall back to the whole text.
    function extractJson(text) {
      const m = text.match(/```json\s*([\s\S]*?)```/) || text.match(/```\s*([\s\S]*?)```/);
      const candidate = m ? m[1] : text;
      // Trim leading prose if any:
      const start = candidate.indexOf('{');
      const end = candidate.lastIndexOf('}');
      if (start === -1 || end === -1) throw new Error('Could not find JSON in response');
      return JSON.parse(candidate.slice(start, end + 1));
    }

    async function generateListing({ photoBlobs, hints, categoryLabel, itemLabel }) {
      // Resize and convert each photo to base64 for the vision API
      const imageBlocks = [];
      for (const blob of photoBlobs) {
        const resized = await resizeImage(blob, 1280, 0.85);
        const dataUrl = await blobToDataUrl(resized);
        const base64 = dataUrl.split(',')[1];
        imageBlocks.push({
          type: 'image',
          source: { type: 'base64', media_type: 'image/jpeg', data: base64 },
        });
      }

      const system = `You write listings for items being sold on platforms like eBay, Facebook Marketplace, OfferUp, Craigslist, and Nextdoor.

Your listings sound like a real person wrote them — clear, honest, scannable, with specific details a buyer would care about. You point out flaws you can see in the photos rather than hiding them. You don't use clickbait, ALL CAPS, or salesy fluff.

You ALWAYS respond with a single JSON object inside a \`\`\`json ... \`\`\` code block. No prose outside the block.`;

      const ctxLines = [];
      if (categoryLabel) ctxLines.push(`Category the seller picked: ${categoryLabel}`);
      if (itemLabel) ctxLines.push(`Item type the seller picked: ${itemLabel}`);
      const ctx = ctxLines.length ? `\n${ctxLines.join('\n')}\n` : '';

      const userText = `Look at these photos of an item I want to sell and write the listing.
${ctx}
${hints ? `My hints / extra info:\n${hints}\n\n` : ''}Return JSON with this exact shape:
{
  "title": string (max 80 chars, search-friendly, includes brand/model if visible),
  "description": string (3 to 6 short paragraphs OR a short intro plus a bullet list — your call based on the item; cover what it is, condition with specifics, dimensions/specs if you can estimate, what's included, any flaws visible in photos),
  "category": string (broad > narrow, e.g. "Furniture > Sofas" or "Electronics > Cell Phones"),
  "condition": "new" | "like_new" | "used_good" | "used_fair" | "for_parts",
  "suggestedPriceUSD": { "low": number|null, "fair": number|null, "high": number|null },
  "tags": string[] (5 to 10 short tags, lowercase),
  "flagsForUser": string[] (things I should add or verify before posting — e.g. "Add the model number from the back if you have it", "I couldn't see the back from these photos — note any damage")
}

If you genuinely can't tell what the item is, set price values to null and explain in flagsForUser.`;

      const text = await callClaude({
        system,
        maxTokens: 2000,
        messages: [{
          role: 'user',
          content: [...imageBlocks, { type: 'text', text: userText }],
        }],
      });

    // The full sales playbook. Tuned for marketplace-style buyer messages.
    const CHAT_SYSTEM = `You are a sales co-pilot helping a private seller respond to buyers on eBay, Facebook Marketplace, OfferUp, Craigslist, and Nextdoor. Your job is to help the seller close the sale at the best reasonable price while protecting them from scams and time-wasters.

VOICE
- Plain-spoken, friendly, confident. Like a person texting, not a customer-service bot.
- 1-3 sentences for most replies. Use 4-5 only when explaining logistics or describing the item in detail.
- Never use "Hi there!", "I hope this message finds you well", emojis (unless the buyer used one first), or salesy language.
- Match the buyer's energy and formality.
- Match the buyer's language. If they wrote in Spanish, reply in Spanish.

CORE TACTICS
1. Always answer the question that was asked, before pivoting to anything else.
2. Use small concrete details from the listing — model number, dimensions, condition specifics. Specifics build trust.
3. If the buyer asks "is this still available?" reply yes/no in one line and immediately ask one closing question (e.g. "Yes — when could you pick up?").
4. Treat any reply as a chance to move toward a meeting time + place. Don't just answer and stop.
5. Don't volunteer flaws the buyer didn't ask about, but never deny one that exists. If the seller flagged a flaw in the listing, acknowledge it honestly when asked.
6. If the buyer goes silent after expressing interest, suggest a soft re-engage: "Still want this? I have someone else asking but you were first in line."

NEGOTIATION PLAYBOOK
- Anchor: never accept the first offer. If someone offers asking, say "Yes, when can you pick up?" — don't haggle yourself down.
- Lowball threshold: more than ~20% below asking is a lowball.
  - On a lowball: don't get offended. Acknowledge politely, name a counter that's slightly under asking (e.g. asking minus 5-10%), explain briefly why ("similar ones go for $X", "I just dropped the price").
  - Use scarcity sparingly: "I have a few people interested, so I'm sticking close to asking."
- Cash-is-king discount: if the buyer is local and paying cash, a small discount (5-10%) is fine.
- Bundle: if the seller has other listings the buyer might want, suggest bundling for a discount.
- Walk away: if the buyer keeps lowballing, end politely: "Appreciate the offer — I'll keep it listed for now. Let me know if you change your mind."

LOGISTICS
- Pickup default. Don't ship unless the listing explicitly offers shipping.
- Suggest a public meeting spot for higher-value items: "There's a Starbucks parking lot near me, works for both of us?"
- Don't share the seller's home address until the buyer has committed to a specific pickup window.
- Payment: cash on pickup, or platform-native payment (eBay Managed Payments, FB Marketplace's payment, Venmo for trusted platforms). NEVER Zelle/Cash App/Wire from people you haven't met. NEVER checks. NEVER pay-then-ship without platform escrow.

SCAM DETECTION (if you see any of these, warn the seller in [brackets] at the END of your reply, and draft a polite decline as the reply itself)
- "I'll send my agent / shipping company to pick up"
- "I'll pay extra if you ship"
- Asking for the seller's phone number to "verify" with a code (Google Voice scam — the code lets them set up an account in your name)
- Wanting to pay via wire, gift cards, Western Union, crypto
- Pushing the seller to a different platform / messaging app immediately
- Offering more than asking with no negotiation
- "Lost my password, can you log in for me", anything that asks for credentials
- Buyer's profile is brand new with no history (if you can tell)

SAFETY ADVICE (deliver in [brackets] after the reply, not in the reply itself)
- For high-value items meeting in person, suggest the seller bring someone with them or use a police-station "safe trade zone" (most cities have them).
- Remind the seller to wait for cash to be in hand or platform payment to clear before handing over the item.

OUTPUT FORMAT
Always output JSON in a \`\`\`json block, with this shape:
{
  "reply": string,            // the actual reply text the seller can send as-is
  "intent": "available_q" | "details_q" | "price_offer" | "lowball" | "scam_suspected" | "logistics" | "going_silent" | "ghosting_recovery" | "small_talk" | "other",
  "notes": string,            // 1-2 sentence private note to the seller — what you noticed, what's the play, what to watch for. Empty string if nothing to flag.
  "suggested_followups": string[]   // up to 3 short labels for next-step replies the seller might want, e.g. "Confirm pickup time", "Counter at $X", "Decline politely"
}
No prose outside the JSON block.`;

    async function chatReply({ listing, conversation, instruction }) {

      const flagsBlock = listing.flagsForUser?.length
        ? `\nKnown caveats the seller noted:\n${listing.flagsForUser.map((f) => '- ' + f).join('\n')}`
        : '';

      const listingSummary = `=== LISTING ===
Title: ${listing.title}
Asking price: $${priceLine}
Condition: ${listing.condition}
Category: ${listing.category || 'unspecified'}
Description:
${listing.description}${flagsBlock}
=== END LISTING ===`;

      const convoText = conversation.length === 0
        ? '(No messages yet.)'
        : conversation.map((m) => `${m.from === 'buyer' ? 'BUYER' : 'SELLER (you)'}: ${m.text}`).join('\n');

      const userText = `${listingSummary}

=== CONVERSATION SO FAR ===
${convoText}
=== END CONVERSATION ===

${instruction ? `Special instruction from the seller: "${instruction}"\n\n` : ''}Draft the seller's next reply. Output JSON only.`;

      const text = await callClaude({
        system: CHAT_SYSTEM,
        messages: [{ role: 'user', content: userText }],
        maxTokens: 800,
      });
      try {
        return extractJson(text);
      } catch {
        // If the model didn't return clean JSON, fall back to plain text
        return { reply: text.trim(), intent: 'other', notes: '', suggested_followups: [] };
      }
    }

    function formatForClipboard(listing) {

      return `${listing.title}\n${price ? `\n$${price}\n` : ''}\n${listing.description}\n\n${listing.tags?.length ? `Tags: ${listing.tags.join(', ')}` : ''}`.trim();

    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        return true;
      } catch {
        // Fallback for older browsers
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch {}
        document.body.removeChild(ta);
        return false;
      }
    }

    // ============================================================
    // Listing health score
    // ============================================================
    function computeHealth(draft) {
      if (!draft || !draft.listing) return { score: 0, items: [] };
      const items = [];
      let score = 0;

      const photoCount = (draft.photoIds || []).length;
      const photosOk = photoCount >= 3;
      items.push({ ok: photosOk, label: photosOk ? `${photoCount} photos` : `Only ${photoCount} photo${photoCount === 1 ? '' : 's'} — aim for 3+` });
      if (photosOk) score += 25;
      else if (photoCount >= 1) score += 10;

      const desc = draft.listing.description || '';
      const descOk = desc.length >= 100;
      items.push({ ok: descOk, label: descOk ? 'Description has substance' : 'Description is short — add specifics' });
      if (descOk) score += 25;

      const priceOk = !!(draft.listing.askingPrice && draft.listing.askingPrice > 0);
      items.push({ ok: priceOk, label: priceOk ? `Priced at $${draft.listing.askingPrice}` : 'No price set yet' });
      if (priceOk) score += 20;

      const tagCount = (draft.listing.tags || []).length;
      const tagsOk = tagCount >= 3;
      items.push({ ok: tagsOk, label: tagsOk ? `${tagCount} tags` : 'Add a few tags for searchability' });
      if (tagsOk) score += 15;

      const flags = draft.listing.flagsForUser || [];
      const dismissed = draft.dismissedFlags || [];
      const openFlagCount = flags.filter((f) => !dismissed.includes(f)).length;
      const flagsOk = openFlagCount === 0;
      items.push({ ok: flagsOk, label: flagsOk ? 'No open flags' : `${openFlagCount} thing${openFlagCount === 1 ? '' : 's'} the AI flagged to verify` });
      if (flagsOk) score += 15;

      return { score, items };
    }

    function healthRingSvg(score) {
      const r = 36, c = 2 * Math.PI * r;
      const offset = c - (c * score / 100);
      const cls = score >= 80 ? '' : score >= 50 ? 'warn' : 'bad';
      return `
        <div class="health-ring ${cls}">
          <svg width="88" height="88" viewBox="0 0 88 88">
            <circle class="track" cx="44" cy="44" r="${r}" fill="none" stroke-width="8" />
            <circle class="bar" cx="44" cy="44" r="${r}" fill="none" stroke-width="8"
              stroke-dasharray="${c.toFixed(2)}"
              stroke-dashoffset="${offset.toFixed(2)}"
              stroke-linecap="round" />
          </svg>
          <div class="num">${score}</div>
        </div>
      `;
    }

    // ============================================================
    // Sales aggregation
    // ============================================================
    function aggregateStats(drafts) {
      let posted = 0, sold = 0, profit = 0, openOffers = 0;
      const weekAgo = Date.now() - 7 * 24 * 60 * 60 * 1000;
      let postedThisWeek = 0;
      for (const d of drafts) {
        if (d.status === 'posted') posted++;
        if (d.status === 'sold') {
          sold++;
          if (typeof d.soldFor === 'number') profit += d.soldFor;
        }
        const lastPost = (d.postedTo || []).map((p) => p.postedAt).sort().pop();
        if (lastPost && lastPost > weekAgo) postedThisWeek++;
        for (const o of (d.offers || [])) if (o.status === 'open') openOffers++;
      }
      return { posted, sold, profit, openOffers, postedThisWeek };
    }

    // ============================================================
    // Sparkles (smaller, classier than confetti — for AI moments)
    // ============================================================
    function sparkles({ count = 18, originX, originY } = {}) {
      const wrap = document.createElement('div');
      wrap.className = 'sparkles';
      const cx = originX ?? window.innerWidth / 2;
      const cy = originY ?? window.innerHeight / 3;
      const palette = ['#fff', '#c5d4ff', '#d0baff', '#f5d97a', '#a5c4ff'];
      for (let i = 0; i < count; i++) {
        const span = document.createElement('span');
        span.className = 'sp';
        const angle = Math.random() * Math.PI * 2;
        const dist = 60 + Math.random() * 140;
        const x = cx + Math.cos(angle) * dist;
        const y = cy + Math.sin(angle) * dist;
        span.style.left = `${x}px`;
        span.style.top = `${y}px`;
        span.style.animationDelay = (Math.random() * 0.25) + 's';
        const color = palette[Math.floor(Math.random() * palette.length)];
        span.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 14 14" xmlns="http://www.w3.org/2000/svg">
            <path d="M7 0 L8.2 5.8 L14 7 L8.2 8.2 L7 14 L5.8 8.2 L0 7 L5.8 5.8 Z" fill="${color}" />
          </svg>
        `;
        wrap.appendChild(span);
      }
      document.body.appendChild(wrap);
      setTimeout(() => wrap.remove(), 1800);
    }

    // ============================================================
    // "The genie is thinking…" — small, branded inline indicator.
    // Pick a verb suited to the action so it feels alive.
    // ============================================================
    const THINK_VERBS = {
      generating: 'Weaving your listing…',
      categorizing: 'Peeking at the photo…',
      rewriting: 'Polishing your words…',
      replying: 'Thinking up a reply…',
      processing: 'Working magic…',
    };
    function thinking(kind = 'processing') {
      const text = THINK_VERBS[kind] || THINK_VERBS.processing;
      return `<span class="genie-think"><span class="spark">✨</span><span class="text">${text}</span></span>`;
    }

    // ============================================================
    // Confetti (called on milestones)
    // ============================================================
    function confetti(count = 60) {
      const colors = ['#4f8cff', '#6d5cff', '#22c55e', '#f59e0b', '#ef4444', '#fff'];
      const wrap = document.createElement('div');
      wrap.className = 'confetti';
      for (let i = 0; i < count; i++) {
        const span = document.createElement('span');
        span.style.left = (Math.random() * 100) + '%';
        span.style.background = colors[Math.floor(Math.random() * colors.length)];
        span.style.animationDelay = (Math.random() * 0.3) + 's';
        span.style.animationDuration = (1.2 + Math.random() * 0.9) + 's';
        wrap.appendChild(span);
      }
      document.body.appendChild(wrap);
      setTimeout(() => wrap.remove(), 2400);
    }

    // ============================================================
    // Modal
    // ============================================================
    function openModal(html) {
      const root = document.createElement('div');
      root.className = 'modal-backdrop';
      root.innerHTML = `<div class="modal">${html}</div>`;
      // Only dismiss when the click is ON the backdrop itself, not bubbled
      // from a child. Avoids stealing taps that should hit buttons inside.
      root.addEventListener('click', (e) => {
        if (e.target === root) root.remove();
      });
      document.body.appendChild(root);
      // Attach data-action handlers for buttons inside the modal
      root.querySelectorAll('[data-action]').forEach((el) => el.addEventListener('click', onAction));
      return root;
    }
    function closeModal() {
      document.querySelectorAll('.modal-backdrop').forEach((m) => m.remove());
    }

    // App state
    // ============================================================
    const state = {
      view: 'home', // home | welcome | new | edit | chat | settings
      currentDraftId: null,
      // transient (not persisted): photo blobs being worked on this session
      session: {

        categoryId: null,
        itemId: null,
        photoBlobs: [],
        hints: '',
        listing: null,
        generating: false,

      chat: {
        // Conversations live ON the draft now (draft.conversation). This holds
        // only transient UI state for the chat view.
        suggesting: false,
        lastMeta: null, // {intent, notes, suggested_followups} from the most recent AI reply
      },
      rewriting: false, // global flag so double-tap doesn't fire two rewrites
    };

    function setView(view, { draftId } = {}) {
      // If the active draft is changing, drop cached object URLs for the previous draft.
      if (draftId !== undefined && draftId !== state.currentDraftId) {
        photoUrlCache.clearPersisted();
      }
      // Leaving the new-listing flow? Drop in-session URLs.
      if (state.view === 'new' && view !== 'new') {
        photoUrlCache.clearSession();

      state.view = view;
      if (draftId !== undefined) state.currentDraftId = draftId;
      window.scrollTo(0, 0);
      render();

    function toast(msg, kind = 'good', ms = 2200) {
      const t = document.createElement('div');
