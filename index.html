    // ============================================================
    // Render dispatcher
    // ============================================================
    async function render() {
      const root = document.getElementById('root');
      // Capture focus state + cursor position so re-renders don't kick the user
      // out of a textarea / input while they're typing.
      const active = document.activeElement;
      const focusInfo = active && (active.tagName === 'TEXTAREA' || active.tagName === 'INPUT')
        ? { id: active.id, selStart: active.selectionStart, selEnd: active.selectionEnd, scrollY: window.scrollY }
        : null;

      let html = '';
      switch (state.view) {
        case 'welcome': html = renderWelcome(); break;
        case 'home': html = await renderHome(); break;
        case 'sales': html = await renderSales(); break;
        case 'new': html = await renderNew(); break;
        case 'edit': html = await renderEdit(); break;
        case 'chat': html = await renderChat(); break;
        case 'settings': html = renderSettings(); break;
        default: html = await renderHome();
      }
      root.innerHTML = html;
      // Trigger the page-enter animation only on view changes, not focus restores.
      // We tag the inner container via JS rather than the template so we don't
      // have to thread a class through every renderer.
      if (!focusInfo) {
        const firstContainer = root.querySelector('.container');
        if (firstContainer) {
          firstContainer.classList.remove('page-enter');
          // Force reflow so animation re-runs across consecutive view changes
          void firstContainer.offsetWidth;
          firstContainer.classList.add('page-enter');
        }
      }
      attachHandlers();

      // Restore focus + selection if the same element still exists.
      if (focusInfo && focusInfo.id) {
        const el = document.getElementById(focusInfo.id);
        if (el && (el.tagName === 'TEXTAREA' || el.tagName === 'INPUT')) {
          try {
            el.focus({ preventScroll: true });
            if (typeof focusInfo.selStart === 'number' && el.setSelectionRange) {
              el.setSelectionRange(focusInfo.selStart, focusInfo.selEnd);
            }
          } catch {}
          window.scrollTo(0, focusInfo.scrollY);
        }
      }
    }

    // ============================================================
    // Event handlers
    // ============================================================
    function attachHandlers() {
      document.querySelectorAll('[data-action]').forEach((el) => {
        el.addEventListener('click', onAction);
      });
      const cam = document.getElementById('add-photo-camera');
      const gal = document.getElementById('add-photo-gallery');
      if (cam) cam.addEventListener('change', onPhotoAdd);
      if (gal) gal.addEventListener('change', onPhotoAdd);
      const magicPhoto = document.getElementById('magic-photo');
      if (magicPhoto) magicPhoto.addEventListener('change', onMagicCategorizePhoto);
      const hints = document.getElementById('hints');
      if (hints) hints.addEventListener('input', (e) => { state.session.hints = e.target.value; });
    }

    async function onAction(e) {
      const el = e.currentTarget;
      const action = el.dataset.action;
      const id = el.dataset.id;
      const idx = el.dataset.idx;
      try {
        switch (action) {
          case 'tab-home': setView('home'); break;
          case 'tab-new': resetSession(); setView('new'); break;
          case 'tab-sales': setView('sales'); break;
          case 'tab-settings':
          case 'settings': setView('settings'); break;
          case 'new': resetSession(); setView('new'); break;
          case 'back': await onBack(); break;
          case 'back-edit': setView('edit'); break;
          case 'open': setView('edit', { draftId: id }); break;

          case 'welcome-done':
            localStorage.setItem('seen_welcome', '1');
            setView('home');
            break;
          case 'pick-category': onPickCategory(id); break;
          case 'pick-item': onPickItem(id); break;
          case 'step-back': onStepBack(); break;
          case 'step-next': onStepNext(); break;

          case 'save-settings': onSaveSettings(); break;
          case 'wipe': await onWipe(); break;

          case 'remove-photo': onRemovePhoto(parseInt(idx, 10)); break;
          case 'cleanup-all': await onCleanupAll(); break;
          case 'reset-photos': onResetPhotos(); break;
          case 'generate': await onGenerate(); break;

          case 'save-edits': await onSaveEdits(); break;
          case 'delete-draft': await onDeleteDraft(); break;
          case 'market': await onMarket(id); break;
          case 'open-chat': await onOpenChat(); break;
          case 'suggest-reply': await onSuggestReply(); break;
          case 'redo-reply': await onRedoReply(); break;
          case 'copy-reply': await onCopyReply(); break;
          case 'share-reply': await onShareReply(); break;
          case 'reset-chat': await onResetChat(); break;
          case 'prefill-buyer': onPrefillBuyer(el.dataset.text); break;
          case 'followup': await onFollowup(el.dataset.text); break;
          case 'share-listing': await onShareListing(); break;
          case 'download-photos': await onDownloadPhotos(); break;

          case 'magic-categorize': document.getElementById('magic-photo')?.click(); break;
          case 'rewrite': await onRewrite('better'); break;
          case 'rewrite-shorter': await onRewrite('shorter'); break;
          case 'rewrite-honest': await onRewrite('honest'); break;
          case 'dismiss-flag': await onDismissFlag(el.dataset.flag); break;

          case 'toggle-posted': await onTogglePosted(id); break;
          case 'add-offer': onAddOffer(); break;
          case 'submit-offer': await onSubmitOffer(); break;
          case 'remove-offer': await onRemoveOffer(parseInt(idx, 10)); break;
          case 'mark-sold': onMarkSoldDialog(); break;
          case 'submit-sold': await onSubmitSold(); break;
          case 'unmark-sold': await onUnmarkSold(); break;
          case 'mark-removed': await onMarkRemoved(); break;
          case 'close-modal': closeModal(); break;
        }
      } catch (err) {
        console.error(err);
        toast(err.message || 'Something went wrong', 'bad', 4000);
      }
    }

    async function onBack() {
      if (state.view === 'new') {
        // No work yet → leave silently
        if (state.session.photoBlobs.length === 0 && !state.session.itemId) {
          resetSession();
          setView('home');
          return;
        }
        const photoCount = state.session.photoBlobs.length;
        const msg = photoCount > 0
          ? `Discard ${photoCount} photo${photoCount === 1 ? '' : 's'} and start over?`
          : 'Start over?';
        if (confirm(msg)) {
          resetSession();
          setView('home');
        }
      } else if (state.view === 'edit' || state.view === 'settings') {
        setView('home');
      } else {
        setView('home');
      }
    }

    function onPickCategory(catId) {
      state.session.categoryId = catId;
      state.session.itemId = null;
      state.session.step = 'item';
      render();
    }

    function onPickItem(itemId) {
      state.session.itemId = itemId;
      state.session.step = 'photos';
      render();
    }

    function onStepBack() {
      const order = ['category', 'item', 'photos', 'details'];
      const idx = order.indexOf(state.session.step);
      if (idx <= 0) {
        resetSession();
        setView('home');
        return;
      }
      // Save the typed hints so they're not lost when stepping back+forward.
      const ta = document.getElementById('hints');
      if (ta) state.session.hints = ta.value;
      state.session.step = order[idx - 1];
      render();
    }

    function onStepNext() {
      // Persist any text from the photo step before leaving.
      const ta = document.getElementById('hints');
      if (ta) state.session.hints = ta.value;
      const order = ['category', 'item', 'photos', 'details'];
      const idx = order.indexOf(state.session.step);
      if (idx < 0 || idx >= order.length - 1) return;
      // Validate transitions
      if (state.session.step === 'photos' && state.session.photoBlobs.length === 0) {
        toast('Add at least one photo first.', 'bad');
        return;
      }
      state.session.step = order[idx + 1];
      render();
    }

    function resetSession() {
      photoUrlCache.clearSession();
      state.session = {
        step: 'category', categoryId: null, itemId: null,
        photoBlobs: [], hints: '', listing: null, generating: false,
        magicDetecting: false,
      };
      state.chat = { suggesting: false, lastMeta: null };
    }

    async function onPhotoAdd(e) {
      const files = Array.from(e.target.files || []);
      if (files.length === 0) return;
      for (const file of files) {
        const blob = await fileToBlob(file);
        // Resize originals up front to keep memory sane (but keep an ample copy)
        const originalBlob = await resizeImage(blob, 2000, 0.92);
        state.session.photoBlobs.push({ originalBlob, processedBlob: null });
      }
      e.target.value = '';
      await render();
    }

    function onRemovePhoto(idx) {
      state.session.photoBlobs.splice(idx, 1);
      // Indices shifted; safest to drop and let the cache rebuild on next render.
      photoUrlCache.clearSession();
      render();
    }

    function onResetPhotos() {
      for (const p of state.session.photoBlobs) p.processedBlob = null;
      photoUrlCache.clearSession();
      render();
    }

    async function onCleanupAll() {
      const photos = state.session.photoBlobs;
      const todo = photos.filter((p) => !p.processedBlob);
      if (todo.length === 0) { toast('Already cleaned'); return; }
      toast('Loading the AI image library (first time downloads ~80MB)…', 'good', 3500);
      let removeBackground;
      try {
        removeBackground = await ensureBgRemoval();
      } catch (err) {
        toast(err.message, 'bad', 5000);
        return;
      }
      toast(`Removing background from ${todo.length} photo${todo.length > 1 ? 's' : ''}…`);
      for (const p of photos) {
        if (p.processedBlob) continue;
        try {
          const cutoutBlob = await removeBackground(p.originalBlob);
          // Composite onto white so platforms display nicely.
          p.processedBlob = await compositeOnColor(cutoutBlob, '#ffffff');
          await render(); // progressive update
        } catch (err) {
          console.error('bg removal failed', err);
          toast('Background removal failed for one photo', 'bad');
        }
      }
      toast('Done.', 'good');
    }

    async function onGenerate() {
      if (!requireApiKey()) return;
      if (state.session.generating) return; // ignore double-taps
      // Capture any in-flight textarea text first.
      const ta = document.getElementById('hints');
      if (ta) state.session.hints = ta.value;
      const photos = state.session.photoBlobs;
      if (photos.length === 0) { toast('Add at least one photo.', 'bad'); return; }
      state.session.generating = true;
      await render();
      try {
        const blobs = photos.map((p) => p.processedBlob || p.originalBlob);
        const hintsParts = [];
        if (state.session.hints) hintsParts.push(state.session.hints);
        if (settings.sellerLocation) hintsParts.push(`Seller location: ${settings.sellerLocation}`);
        const cat = getCategory(state.session.categoryId);
        const item = getItem(state.session.categoryId, state.session.itemId);
        const listing = await generateListing({
          photoBlobs: blobs,
          hints: hintsParts.join('\n'),
          categoryLabel: cat?.label,
          itemLabel: item?.label,
        });

        // Persist photos and create the draft
        const photoIds = [];
        let thumbDataUrl = null;
        for (let i = 0; i < photos.length; i++) {
          const p = photos[i];
          const finalBlob = p.processedBlob || p.originalBlob;
          const pid = await savePhoto(finalBlob);
          photoIds.push(pid);
          if (i === 0) {
            const thumb = await resizeImage(finalBlob, 240, 0.8);
            thumbDataUrl = await blobToDataUrl(thumb);
          }
        }
        const draft = {
          id: 'd_' + Math.random().toString(36).slice(2, 10),
          createdAt: Date.now(),
          updatedAt: Date.now(),
          photoIds,
          thumbDataUrl,
          listing: { ...listing, askingPrice: listing.suggestedPriceUSD?.fair ?? null },
        };
        await saveDraft(draft);
        state.session.generating = false;
        resetSession();
        setView('edit', { draftId: draft.id });
        sparkles({ count: 22 });
        toast('Listing ready. Review and edit before posting.', 'good');
      } catch (err) {
        state.session.generating = false;
        await render();
        throw err;
      }
    }

    async function onDismissFlag(flag) {
      const draft = await getDraft(state.currentDraftId);
      if (!draft) return;
      draft.dismissedFlags = draft.dismissedFlags || [];
      if (!draft.dismissedFlags.includes(flag)) draft.dismissedFlags.push(flag);
      await saveDraft(draft);
      await render();
    }

    async function onSaveEdits() {
      const draft = await getDraft(state.currentDraftId);
      if (!draft) return;
      const ttl = document.getElementById('ttl').value.trim();
      const desc = document.getElementById('desc').value;
      const cat = document.getElementById('cat').value.trim();
      const cond = document.getElementById('cond').value;
      const priceStr = document.getElementById('price').value.trim();
      const price = priceStr ? parseFloat(priceStr) : null;
      draft.listing.title = ttl;
      draft.listing.description = desc;
      draft.listing.category = cat;
      draft.listing.condition = cond;
      draft.listing.askingPrice = Number.isFinite(price) ? price : null;
      await saveDraft(draft);
      toast('Saved.', 'good');
    }

    async function onDeleteDraft() {
      if (!confirm('Delete this draft and its photos?')) return;
      await deleteDraft(state.currentDraftId);
      state.currentDraftId = null;
      setView('home');
    }

    async function onMarket(marketId) {
      const draft = await getDraft(state.currentDraftId);
      if (!draft) return;
      const market = MARKETS.find((m) => m.id === marketId);
      if (!market) return;
      const text = formatForClipboard(draft.listing);
      await copyToClipboard(text);
      toast(`Copied. Opening ${market.name}…`, 'good', 2800);
      // Slight delay so the toast renders before nav
      setTimeout(() => { window.open(market.url, '_blank', 'noopener'); }, 250);
    }

    async function onShareListing() {
      const draft = await getDraft(state.currentDraftId);
      if (!draft) return;
      const text = formatForClipboard(draft.listing);
      const title = draft.listing.title;

      // Build File objects from the saved photos
      const files = [];
      for (let i = 0; i < (draft.photoIds || []).length; i++) {
        const pid = draft.photoIds[i];
        const blob = await getPhoto(pid);
        if (!blob) continue;
        const ext = (blob.type.includes('png') ? 'png' : 'jpg');
        files.push(new File([blob], `photo-${i + 1}.${ext}`, { type: blob.type || 'image/jpeg' }));
      }

      // Prefer Web Share API with files (mobile)
      if (navigator.canShare && files.length > 0 && navigator.canShare({ files })) {
        try {
          await navigator.share({ title, text, files });
          return;
        } catch (e) {
          if (e.name === 'AbortError') return;
          console.warn('share with files failed, falling back to text-only:', e);
        }
      }
      // Text-only share (some desktop browsers, Android without file share)
      if (navigator.share) {
        try {
          await navigator.share({ title, text });
          await onDownloadPhotos(true);
          return;
        } catch (e) {
          if (e.name === 'AbortError') return;
        }
      }
      // No share API at all (most desktop): copy + tell user
      await copyToClipboard(text);
      toast("Listing copied. This device doesn't support sharing — open your marketplace and paste.", 'good', 4000);
    }

    async function onDownloadPhotos(silent = false) {
      const draft = await getDraft(state.currentDraftId);
      if (!draft || !draft.photoIds?.length) {
        if (!silent) toast('No photos to download.', 'bad');
        return;
      }
      let count = 0, missing = 0;
      for (let i = 0; i < draft.photoIds.length; i++) {
        const blob = await getPhoto(draft.photoIds[i]);
        if (!blob) { missing++; continue; }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        const ext = blob.type?.includes('png') ? 'png' : 'jpg';
        a.download = `${(draft.listing.title || 'listing').replace(/[^a-z0-9]+/gi, '-').slice(0, 40)}-${i + 1}.${ext}`;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
        count++;
        // Small delay between downloads — browsers sometimes throttle batches
        await new Promise((r) => setTimeout(r, 120));
      }
      if (silent) return;
      if (missing > 0) toast(`Saved ${count}; ${missing} couldn't be loaded.`, 'bad', 4000);
      else toast(`Saved ${count} photo${count === 1 ? '' : 's'}.`, 'good');
    }

    async function onOpenChat() {
      state.chat = { suggesting: false, lastMeta: null };
      setView('chat');
    }

    async function onSuggestReply() {
      if (!requireApiKey()) return;
      if (state.chat.suggesting) return;
      const ta = document.getElementById('buyer-msg');
      const instr = document.getElementById('instruction');
      const buyerText = (ta?.value || '').trim();
      const instruction = (instr?.value || '').trim();
      const draft = await getDraft(state.currentDraftId);
      if (!draft) return;
      draft.conversation = draft.conversation || [];
      // Only push the buyer message if there's new buyer text.
      if (buyerText) draft.conversation.push({ from: 'buyer', text: buyerText, at: Date.now() });
      else if (draft.conversation.length === 0) {
        toast('Paste the buyer\'s message first.', 'bad');
        return;
      }
      state.chat.suggesting = true;
      await saveDraft(draft);
      await render();
      try {
        const result = await chatReply({ listing: draft.listing, conversation: draft.conversation, instruction });
        draft.conversation.push({ from: 'you', text: result.reply, at: Date.now() });
        state.chat.lastMeta = { intent: result.intent, notes: result.notes, suggested_followups: result.suggested_followups || [] };
        await saveDraft(draft);
      } finally {
        state.chat.suggesting = false;
        await render();
      }
    }

    async function onRedoReply() {
      if (!requireApiKey()) return;
      if (state.chat.suggesting) return;
      const draft = await getDraft(state.currentDraftId);
      if (!draft || !draft.conversation?.length) return;
      // Drop the last seller message and re-ask
      const last = draft.conversation[draft.conversation.length - 1];
      if (last.from !== 'you') return;
      draft.conversation.pop();
      await saveDraft(draft);
      state.chat.suggesting = true;
      await render();
      try {
        const result = await chatReply({ listing: draft.listing, conversation: draft.conversation, instruction: 'Try a different angle than before — same goal but new wording.' });
        draft.conversation.push({ from: 'you', text: result.reply, at: Date.now() });
        state.chat.lastMeta = { intent: result.intent, notes: result.notes, suggested_followups: result.suggested_followups || [] };
        await saveDraft(draft);
      } finally {
        state.chat.suggesting = false;
        await render();
      }
    }

    async function onFollowup(label) {
      if (!requireApiKey()) return;
      if (state.chat.suggesting) return;
      // The user picked a one-tap follow-up; treat the label as an instruction
      // and ask for a new seller reply WITHOUT a new buyer message.
      const draft = await getDraft(state.currentDraftId);
      if (!draft || !draft.conversation?.length) return;
      // Drop the previous seller reply if it's the latest message — this is a redo with a directive
      if (draft.conversation[draft.conversation.length - 1].from === 'you') draft.conversation.pop();
      state.chat.suggesting = true;
      await saveDraft(draft);
      await render();
      try {
        const result = await chatReply({ listing: draft.listing, conversation: draft.conversation, instruction: label });
        draft.conversation.push({ from: 'you', text: result.reply, at: Date.now() });
        state.chat.lastMeta = { intent: result.intent, notes: result.notes, suggested_followups: result.suggested_followups || [] };
        await saveDraft(draft);
      } finally {
        state.chat.suggesting = false;
        await render();
      }
    }

    function onPrefillBuyer(text) {
      const ta = document.getElementById('buyer-msg');
      if (ta) { ta.value = text; ta.focus(); }
    }

    async function onResetChat() {
      if (!confirm('Clear this chat and start a new buyer thread?')) return;
      const draft = await getDraft(state.currentDraftId);
      if (!draft) return;
      draft.conversation = [];
      state.chat.lastMeta = null;
      await saveDraft(draft);
      await render();
    }

    async function onCopyReply() {
      const draft = await getDraft(state.currentDraftId);
      const last = draft?.conversation?.slice().reverse().find((m) => m.from === 'you');
      if (!last) return;
      await copyToClipboard(last.text);
      toast('Reply copied.', 'good');
    }

    async function onShareReply() {
      const draft = await getDraft(state.currentDraftId);
      const last = draft?.conversation?.slice().reverse().find((m) => m.from === 'you');
      if (!last) return;
      if (navigator.share) {
        try {
          await navigator.share({ text: last.text });
        } catch (e) { if (e.name !== 'AbortError') throw e; }
      } else {
        await copyToClipboard(last.text);
        toast('Reply copied (no share sheet on this device).', 'good');
      }
    }

    function onSaveSettings() {
      const wasEmpty = !settings.apiKey;
      const k = document.getElementById('apikey').value.trim();
      const m = document.getElementById('model').value;
      const loc = document.getElementById('loc').value.trim();
      settings.apiKey = k;
      settings.model = m;
      settings.sellerLocation = loc;
      toast('Settings saved.', 'good');
      // First-time setup: show the welcome flow before the home screen.
      if (wasEmpty && k && !localStorage.getItem('seen_welcome')) {
        setView('welcome');
      } else {
        setView('home');
      }
    }

    async function onWipe() {
      if (!confirm('Delete ALL drafts and photos? This cannot be undone.')) return;
      photoUrlCache.clearAll();
      await draftsStore.clear();
      await photosStore.clear();
      toast('Wiped.', 'good');
      setView('home');
    }

    // ============================================================
    // Magic: AI auto-detect category from a photo
    // ============================================================
    async function categorizeFromPhoto(blob) {
      const resized = await resizeImage(blob, 1024, 0.85);
      const dataUrl = await blobToDataUrl(resized);
      const base64 = dataUrl.split(',')[1];
      const cats = CATEGORIES.map((c) => ({
        id: c.id,
        label: c.label,
        items: c.items.map((i) => ({ id: i.id, label: i.label })),
      }));
      const system = `You categorize items for a marketplace listing app. You are given a photo and a fixed list of category + item slugs. Pick the best matching category id and item id. Always respond with JSON in a \`\`\`json block.`;
      const user = `Look at this photo and pick the best match.

Available categories and item types:
${JSON.stringify(cats, null, 2)}

Respond with JSON shape:
{
  "categoryId": string,    // must be one of the category ids above
  "itemId": string,        // must be one of the item ids inside that category
  "confidence": "high" | "medium" | "low",
  "guess": string          // 1-2 word guess of what the item actually is, e.g. "iPhone 13", "leather sofa"
}`;
      const text = await callClaude({
        system,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
            { type: 'text', text: user },
          ],
        }],
        maxTokens: 300,
      });
      return extractJson(text);
    }

    async function onMagicCategorizePhoto(e) {
      const file = e.target.files?.[0];
      if (!file) return;
      e.target.value = '';
      if (!requireApiKey()) return;
      state.session.magicDetecting = true;
      await render();
      try {
        // Pre-resize and store as the first photo so we don't waste it.
        const blob = await resizeImage(file, 2000, 0.92);
        state.session.photoBlobs.push({ originalBlob: blob, processedBlob: null });
        const result = await categorizeFromPhoto(blob);
        const cat = getCategory(result.categoryId);
        const item = cat?.items.find((i) => i.id === result.itemId);
        if (cat && item) {
          state.session.categoryId = cat.id;
          state.session.itemId = item.id;
          state.session.step = 'photos';
          sparkles({ count: 12 });
          toast(`Got it — looks like a ${result.guess || item.label.toLowerCase()}.`, 'good', 2600);
        } else {
          toast("Couldn't tell from the photo — pick a category manually.", 'bad');
        }
      } catch (err) {
        console.error(err);
        toast(err.message || 'Auto-detect failed.', 'bad');
      } finally {
        state.session.magicDetecting = false;
        await render();
      }
    }

    // ============================================================
    // Magic: rewrite the listing with a chosen angle
    // ============================================================
    async function rewriteListing({ listing, angle }) {
      const angleHint = {
        better: 'Make this listing 10% better. Same facts, but tighter and more compelling. Keep the same structure unless the existing one is clearly bad.',
        shorter: 'Cut this description to roughly half its length. Keep all the important facts; remove fluff and repetition.',
        honest: 'Make this description more honest and specific. Add hedges where the photos can\'t verify a claim. Be direct about flaws if any are visible.',
      }[angle] || 'Improve this listing.';
      const system = `You rewrite marketplace listings. ${angleHint} Output ONLY the new description text — no preamble, no quotes, no markdown headers. Keep the same factual content; do not invent details that aren't in the original.`;
      const userText = `Original description:
${listing.description}

(Title for context: ${listing.title}. Condition: ${listing.condition}.)

Now rewrite.`;
      return await callClaude({
        system,
        messages: [{ role: 'user', content: userText }],
        maxTokens: 1200,
      });
    }

    async function onRewrite(angle) {
      if (!requireApiKey()) return;
      if (state.rewriting) return;
      const draft = await getDraft(state.currentDraftId);
      if (!draft) return;
      // Capture any pending edits in the textarea first
      const ta = document.getElementById('desc');
      if (ta) draft.listing.description = ta.value;
      state.rewriting = true;
      toast('Rewriting…', 'good', 1500);
      try {
        const newDesc = await rewriteListing({ listing: draft.listing, angle });
        draft.listing.description = newDesc.trim();
        await saveDraft(draft);
        await render();
        toast('Description updated. Edit anything you want.', 'good', 2400);
      } catch (err) {
        toast(err.message || 'Rewrite failed.', 'bad', 4000);
      } finally {
        state.rewriting = false;
      }
    }

    // ============================================================
    // Sales tracking
    // ============================================================
    async function onTogglePosted(platformId) {
      const draft = await getDraft(state.currentDraftId);
      if (!draft) return;
      draft.postedTo = draft.postedTo || [];
      const idx = draft.postedTo.findIndex((p) => p.platform === platformId);
      if (idx >= 0) {
        draft.postedTo.splice(idx, 1);
      } else {
        draft.postedTo.push({ platform: platformId, postedAt: Date.now() });
      }
      // Auto-set status: any postedTo entries → posted; none and not sold → draft
      if (draft.status !== 'sold' && draft.status !== 'removed') {
        draft.status = draft.postedTo.length > 0 ? 'posted' : 'draft';
      }
      await saveDraft(draft);
      await render();
    }

    function onAddOffer() {
      openModal(`
        <h3>Log an offer</h3>
        <p class="muted small" style="margin-bottom: 14px;">Track what buyers offer so you have a record.</p>
        <label class="field">
          <span class="lbl">Amount ($)</span>
          <input class="input" type="number" inputmode="decimal" id="offer-amount" placeholder="120" />
        </label>
        <label class="field">
          <span class="lbl">Buyer name (optional)</span>
          <input class="input" type="text" id="offer-buyer" placeholder="e.g. Mike on Marketplace" />
        </label>
        <div class="row" style="gap: 8px;">
          <button class="btn primary" data-action="submit-offer">Save</button>
          <button class="btn ghost" data-action="close-modal">Cancel</button>
        </div>
      `);
    }

    async function onSubmitOffer() {
      const amt = parseFloat(document.getElementById('offer-amount').value);
      const buyer = document.getElementById('offer-buyer').value.trim();
      if (!Number.isFinite(amt) || amt <= 0) { toast('Enter a valid amount.', 'bad'); return; }
      const draft = await getDraft(state.currentDraftId);
      if (!draft) return;
      draft.offers = draft.offers || [];
      draft.offers.push({ amount: amt, buyer: buyer || null, at: Date.now(), status: 'open' });
      await saveDraft(draft);
      closeModal();
      await render();
      toast('Offer logged.', 'good');
    }

    async function onRemoveOffer(idx) {
      const draft = await getDraft(state.currentDraftId);
      if (!draft) return;
      draft.offers.splice(idx, 1);
      await saveDraft(draft);
      await render();
    }

    function onMarkSoldDialog() {
      openModal(`
        <h3>Mark as sold 🎉</h3>
        <label class="field">
          <span class="lbl">Sold for ($)</span>
          <input class="input" type="number" inputmode="decimal" id="sold-amount" placeholder="120" />
        </label>
        <label class="field">
          <span class="lbl">Where did it sell?</span>
          <select class="select" id="sold-platform">
            <option value="">— pick one —</option>
            ${MARKETS.map((m) => `<option value="${m.id}">${m.name}</option>`).join('')}
            <option value="other">Other / off-platform</option>
          </select>
        </label>
        <div class="row" style="gap: 8px;">
          <button class="btn primary" data-action="submit-sold">Confirm</button>
          <button class="btn ghost" data-action="close-modal">Cancel</button>
        </div>
      `);
    }

    async function onSubmitSold() {
      const amt = parseFloat(document.getElementById('sold-amount').value);
      const plat = document.getElementById('sold-platform').value;
      if (!Number.isFinite(amt) || amt <= 0) { toast('Enter a valid amount.', 'bad'); return; }
      const draft = await getDraft(state.currentDraftId);
      if (!draft) return;
      draft.status = 'sold';
      draft.soldFor = amt;
      draft.soldAt = Date.now();
      draft.soldOnPlatform = plat || null;
      // Mark any matching offer accepted
      if (draft.offers?.length) {
        const match = draft.offers.find((o) => Math.abs(o.amount - amt) < 0.01);
        if (match) match.status = 'accepted';
      }
      await saveDraft(draft);
      closeModal();
      confetti(80);
      await render();
      toast('Nice — logged.', 'good');
    }

    async function onUnmarkSold() {
      const draft = await getDraft(state.currentDraftId);
      if (!draft) return;
      if (!confirm('Undo "sold"?')) return;
      draft.status = (draft.postedTo || []).length > 0 ? 'posted' : 'draft';
      delete draft.soldFor;
      delete draft.soldAt;
      delete draft.soldOnPlatform;
      await saveDraft(draft);
      await render();
    }

    async function onMarkRemoved() {
      const draft = await getDraft(state.currentDraftId);
      if (!draft) return;
      if (!confirm('Mark this listing as removed (didn\'t sell)?')) return;
      draft.status = 'removed';
      await saveDraft(draft);
      await render();
    }

    // ============================================================
    // Boot
    // ============================================================
    (async function init() {
      // Default to settings if no key on first load
      if (!settings.apiKey) state.view = 'settings';
      await render();
    })();
  </script>
